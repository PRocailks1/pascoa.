<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Feliz Páscoa</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #ffe6f0;
    }

    /* Fundo com corações */
    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(#ff4d6d 2px, transparent 2px),
                        radial-gradient(#ff99c8 2px, transparent 2px);
      background-size: 40px 40px;
      animation: move 10s linear infinite;
      z-index: -1;
    }

    @keyframes move {
      from {transform: translateY(0);}
      to {transform: translateY(-40px);}
    }

    .container {
      text-align: center;
      background: white;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 320px;
      display: none;
    }

    h1 {
      color: #ff4d6d;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.3em;
      color: #555;
    }

    .name {
      font-weight: bold;
      color: #d6336c;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-top: 15px;
    }

    .heart {
      font-size: 2em;
      margin-top: 10px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% {transform: scale(1);}
      50% {transform: scale(1.2);}
      100% {transform: scale(1);}
    }

    .login {
      text-align: center;
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="bg"></div>

<!-- Tela de senha -->
<div class="login" id="loginBox">
  <h2>Digite a senha 💌</h2>
  <input type="password" id="senha" placeholder="Senha">
  <br>
  <button onclick="verificarSenha()">Entrar</button>
</div>

<!-- Conteúdo -->
<div class="container" id="conteudo">
  <h1>Feliz Páscoa 🐰🥚</h1>
  <p>Eu te amo, <span class="name">Erick Felipe</span> ❤️</p>

  <!-- SUA FOTO AQUI -->
  <img src="Imagem do WhatsApp 2026-04-02 às 10:56:11.jpeg
" alt="Nossa foto">

  <div class="heart">❤️❤️❤️</div>
</div>

<script>
function verificarSenha() {
  var senha = document.getElementById("senha").value;

  if (senha === "12345") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("conteudo").style.display = "block";
  } else {
    alert("Senha incorreta 😢");
  }
}
</script>

</body>
</html>
