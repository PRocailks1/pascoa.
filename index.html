<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Feliz Páscoa</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ffecd2, #fcb69f);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      max-width: 350px;
      display: none;
    }

    h1 {
      color: #e67e22;
      font-size: 2em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.3em;
      color: #555;
    }

    .name {
      font-weight: bold;
      color: #e74c3c;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-top: 20px;
    }

    .heart {
      font-size: 2.5em;
      margin-top: 15px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .login {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    input {
      padding: 10px;
      font-size: 1em;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background-color: #e67e22;
      color: white;
      font-size: 1em;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Tela de senha -->
  <div class="login" id="loginBox">
    <h2>Digite a senha 💌</h2>
    <input type="password" id="senha" placeholder="Senha">
    <br>
    <button onclick="verificarSenha()">Entrar</button>
  </div>

  <!-- Conteúdo escondido -->
  <div class="container" id="conteudo">
    <h1>Feliz Páscoa 🐰🥚</h1>
    <p>Eu te amo, <span class="name">Erick Felipe</span> ❤️</p>

    <img src="https://i.imgur.com/8Km9tLL.jpg" alt="Imagem de Páscoa">

    <div class="heart">❤️</div>
  </div>

  <script>
    function verificarSenha() {
      var senha = document.getElementById("senha").value;

      if (senha === "12345") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("conteudo").style.display = "block";
      } else {
        alert("Senha incorreta 😢");
      }
    }
  </script>

</body>
</html>
